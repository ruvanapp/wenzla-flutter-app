    <rect x="470" y="282" width="282" height="576" rx="32" fill="#F7F0E4"/>
    <rect x="567" y="295" width="88" height="8" rx="4" fill="#2B241D"/>
    <text x="494" y="344" class="small">MERCHANT APP</text>
    <text x="494" y="384" class="h">Orders live now</text>
