    <text x="516" y="478" class="pillText">SALES THIS MONTH</text>
    <rect x="494" y="526" width="108" height="72" rx="20" fill="#FFF9F0"/>
    <text x="514" y="556" class="h" style="font-size:22px">18</text>
    <text x="514" y="580" class="small">Orders</text>
    <rect x="620" y="526" width="108" height="72" rx="20" fill="#FFF9F0"/>
    <text x="640" y="556" class="h" style="font-size:22px">$482</text>
    <text x="640" y="580" class="small">Commission</text>
    <text x="494" y="638" class="small">NEW ORDER</text>
    <rect x="494" y="656" width="234" height="104" rx="24" fill="#FFF9F0"/>
    <text x="516" y="686" class="body" fill="#17130E">Ahmed Mohamed</text>
    <text x="516" y="710" class="small">2 items · Downtown address</text>
    <rect x="516" y="728" width="86" height="24" rx="12" fill="#D6A742"/>
    <text x="532" y="744" class="pillText" fill="#17130E">ACCEPT</text>
    <rect x="612" y="728" width="92" height="24" rx="12" fill="#B65B38"/>
    <text x="628" y="744" class="pillText">UPDATE</text>
    <rect x="494" y="782" width="234" height="42" rx="15" fill="#27231F"/>
    <text x="540" y="809" class="pillText">ADD / EDIT PRODUCTS</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="830" y="245" width="520" height="420" rx="36" fill="url(#admin)"/>
    <text x="868" y="302" class="label" fill="#D6A742">ADMIN DASHBOARD</text>
    <text x="868" y="350" class="white" style="font:800 42px Georgia,serif;letter-spacing:-1.8px">Marketplace command room</text>
    <rect x="868" y="386" width="94" height="88" rx="22" fill="#FFF8EB" opacity="0.12"/>
    <text x="890" y="426" class="num">42</text>
    <text x="890" y="454" class="adminMuted">Merchants</text>
    <rect x="978" y="386" width="94" height="88" rx="22" fill="#FFF8EB" opacity="0.12"/>
    <text x="1000" y="426" class="num">318</text>
    <text x="1000" y="454" class="adminMuted">Products</text>
    <rect x="1088" y="386" width="94" height="88" rx="22" fill="#FFF8EB" opacity="0.12"/>
    <text x="1110" y="426" class="num">94</text>
    <text x="1110" y="454" class="adminMuted">Orders</text>
    <rect x="1198" y="386" width="114" height="88" rx="22" fill="#D6A742"/>
    <text x="1218" y="426" class="dark" style="font:800 30px Georgia,serif">$2.1k</text>
    <text x="1218" y="454" class="small" fill="#17130E">Commission</text>
    <rect x="868" y="510" width="210" height="110" rx="24" fill="#FFF8EB" opacity="0.12"/>
    <text x="890" y="542" class="adminText">Merchant approvals</text>
    <text x="890" y="574" class="adminMuted">Olive Basket</text>
    <rect x="990" y="558" width="66" height="22" rx="11" fill="#D6A742"/>
    <text x="1003" y="573" class="pillText" fill="#17130E">PENDING</text>
    <text x="890" y="604" class="adminMuted">Roast House</text>
    <rect x="990" y="588" width="66" height="22" rx="11" fill="#53633C"/>
    <text x="1005" y="603" class="pillText">LIVE</text>
    <rect x="1100" y="510" width="212" height="110" rx="24" fill="#FFF8EB" opacity="0.12"/>
    <text x="1122" y="542" class="adminText">Reports</text>
    <path d="M1124 594C1148 565 1172 582 1190 553C1212 520 1239 565 1288 536" stroke="#D6A742" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="846" y="700" width="488" height="96" rx="30" fill="#FFF8EB" opacity="0.78"/>
    <circle cx="894" cy="748" r="24" fill="#B65B38"/>
    <text x="934" y="738" class="body" fill="#17130E">Business model</text>
    <text x="934" y="766" class="h" style="font-size:24px">Admin earns percentage commission from every delivered order.</text>
  </g>
</svg>