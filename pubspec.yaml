name: wenzla_customer_app
description: Customer mobile app for سوق العسل marketplace.
publish_to: 'none'
version: 1.0.16+16

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  http: ^1.2.2
  firebase_core: ^3.15.2
  firebase_crashlytics: ^4.1.3
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.3.0
  provider: ^6.1.2
  image_picker: ^1.1.2
  url_launcher: ^6.3.0
  share_plus: ^12.0.2
  font_awesome_flutter: ^10.7.0
  google_maps_flutter: ^2.14.0
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/branding/souq_alasal_logo.png
    - assets/store_logos/noor.png
    - assets/store_logos/rahma.png
    - assets/store_logos/sultan.png
    - assets/store_logos/baraka.png
    - assets/store_logos/huda.png
    - assets/store_logos/shifa.png
    - assets/store_logos/reef.png
    - assets/store_logos/mecca.png
    - assets/store_logos/asala.png
    - assets/store_logos/qanawi.png
    - assets/store_logos/rahiq.png
